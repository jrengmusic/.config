# start numbering from 1 instead of 0
set -g base-index 1
set -g pane-base-index 1

# Prevent applications from changing pane titles
set -g allow-rename off
set -g automatic-rename off
set -g allow-set-title off

# increase history limit
set -g history-limit 10000

# fix terminal Title display
# set -g set-titles-string "#{pane_title}"

# Prevent applications from setting pane titles
set -g set-titles off

# enable mouse support
set -g mouse on
set -s focus-events on

set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",*:RGB"

# disable waiting time when pressing escape
set -s escape-time 0

# ============================================================================= 
# menu
# ============================================================================= 
# Fire popup on new session creation
set-hook -g after-new-session 'run-shell "~/.config/tmux/scripts/tmux-launcher.sh"'

# ============================================================================= 
# popup
# ============================================================================= 
# Terminal Interface for giT
set-option -g default-command $SHELL
bind t display-popup \
	-d "#{pane_current_path}" \
	-w 78 \
	-h 30 \
	-E "~/.local/bin/tit"

# ============================================================================= 
# keybinds
# ============================================================================= 
set -g prefix ` # use tilde as prefix
bind ` send-prefix # press tilde twice to send to window

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

unbind C-b
unbind c
unbind %
unbind '"'
unbind '\'

bind -N "Renumber windows" BSpace move-window -r
bind -N "Split horizontal" '\' split-window -h -c "#{pane_current_path}"
bind -N "Split vertical" - split-window -v -c "#{pane_current_path}"
bind -N "New window" C-t new-window -c "#{pane_current_path}"
bind -N "Next window" Tab next-window
bind -N "Previous window" BTab previous-window

# vim-style pane navigation
bind -N "Select left pane" h select-pane -L
bind -N "Select down pane" j select-pane -D
bind -N "Select up pane" k select-pane -U
bind -N "Select right pane" l select-pane -R
bind -N "Kill pane" x kill-pane
bind -N "Kill window" C-w kill-window
bind -N "Kill current session" C-q kill-session

#vim style copying
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel 
unbind -T copy-mode-vi MouseDragEnd1Pane


# ============================================================================= 
# style
# ============================================================================= 
# palette
bunker="#090D12"
silkStar="#F3F5C5"
frostbite="#B3F9F5"
littleMermaid="#2C4144"
dolphin="#8CC9D9"
carbon="#333435"
mallard="#2E4D53"
tranquiliTeal="#699DAA"
blueBikini="#00C8D8"
preciousPersimmon="#FC704C"
mattWhite="#FEFFD2"
paradiso="#4E8C93"
caribbeanBlue="#01C2D2"
mediterranea="#33535B"
trappedDarkness="#112130"
corbeau="#0D141C"
dark="#1B2A31"
paleSky="#BAFFFD"
poseidonJr="#67DFEF"
lagoon="#519299"
midnightDreams="#002B35"
gentleCold="#C5F0E9"
cyan="#00FFFF"
# ============================================================================= 
# status bar
set -g status-left-length 100
set -g status-right-length 100
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"

window_left=
window_right=
current_mark=
window_bg=${corbeau}
window_fg=${paradiso}
window_fg_idx=${tranquiliTeal}
current_window_bg=${trappedDarkness}
current_window_fg=${frostbite}
mark=${cyan}

# left status
set -g status-left " \
#[fg=${lagoon}]\ 
${powerline_hex_open}\
#[fg=${poseidonJr},bold]\
#(echo #S | tr '[:lower:]' '[:upper:]')"

set -g window-status-current-format "\
#[fg=${current_window_bg}]${window_left}\
#[fg=${mark}, bg=${current_window_bg}]${current_mark}\
#[bg=${current_window_bg}, fg=${current_window_fg}, bold] #W \
#[fg=${current_window_bg}, bg=default]${window_right}"

set -g window-status-format "\
#[fg=${window_bg}]${window_left}\
#[fg=${window_fg_idx},bg=${window_bg},bold] #I\
#[bg=${window_bg}, fg=${window_fg}, nobold] #W \
#[fg=${window_bg}, bg=default]${window_right}"

separator_color=${mallard}
separator=

set -g status-right "\
#[fg=${blueBikini}] \
#[fg=${paradiso}]#{s|$HOME||;s|/|#[fg=${separator_color}]${separator} #[fg=${paradiso}]|g:pane_current_path}"
#============================================================================= 
# window
set -g window-status-activity-style "fg=${paradiso},bg=${littleMermaid},none"
set -g window-status-style "fg=${paradiso},bg=default,none"

# ============================================================================= 
# message
set -g message-style "fg=${paleSky}, bg=${dark}, align=centre"
set -g message-command-style "fg=${frostbite}, bg=default, none"
# ============================================================================= 
# panes
set -g pane-border-lines simple
set -g pane-border-style "fg=${dark}"
set -g pane-active-border-style "bg=default fg=${trappedDarkness}"

set -g pane-border-status top
pane_icon=󰫄
pane_icon_color=${paradiso}
pane_fg=${dolphin}
set -g pane-border-format "#[fg=${pane_icon_color}]${pane_icon} #[fg=${pane_fg}, bold]#{pane_title}"

# ============================================================================= 
# menu
set -g mode-style "fg=${poseidonJr}, bg=${dark}"
